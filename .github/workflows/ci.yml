# ============================================================================
# seekcode CI —— 宪章 7.2 检查项清单的落地(最终强制层)
# 条款号 → job 映射(宪章 7.2 要求本注释存在;删改任何 job 视同宪章修订 6.2):
#   2.1/2.4 fmt + clippy 零警告        → lint
#   2.5/4.1/4.4 测试三平台矩阵(含防腐①②) → test
#   2.4 MSRV 1.85                      → msrv
#   4.3 覆盖率 70/80                    → coverage
#   2.3 cargo-deny(license/bans)      → deps
#   2.3/5.4 依赖分层白名单              → governance(layer-check.sh)
#   1.1 Spec 锚点 + spec↔test 一致性    → governance(spec-anchor/spec-test)
#   1.2/1.3/2.2/2.4/5.2/6.1 治理检查组  → governance(governance-lite.sh)
# 本地 commit-gate hook 与本 CI 共用 .claude/hooks/ 下同一批脚本,防漂移。
# ============================================================================
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - run: cargo check --all-targets

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: 覆盖率门槛(宪章 4.3;crates/ 未拆分的脚手架期跳过)
        run: |
          if [ ! -d crates ]; then
            echo "WARN: crates/ 不存在(脚手架期),覆盖率跳过——workspace 拆分后本步自动生效"
            exit 0
          fi
          cargo llvm-cov --workspace --fail-under-lines 70
          for c in seek-kernel seek-router seek-config seek-session seek-adapter; do
            [ -d "crates/$c" ] || continue
            cargo llvm-cov -p "$c" --fail-under-lines 80
          done

  deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: 依赖分层(宪章 2.3/5.4)
        run: bash .claude/hooks/layer-check.sh
      - name: spec ↔ test 一致性(宪章 1.1/4.2)
        run: bash .claude/hooks/spec-test-check.sh
      - name: Spec 锚点(宪章 1.1)
        run: |
          status=0
          if [ -d crates ]; then
            while IFS= read -r f; do
              bash .claude/hooks/spec-anchor-check.sh "$f" || status=1
            done < <(find crates -path '*/src/*' -name '*.rs' ! -path '*/tests/*' ! -path '*/benches/*' ! -path '*/src/bin/*')
          else
            echo "WARN: crates/ 不存在(脚手架期),锚点检查跳过"
          fi
          exit $status
      - name: 治理检查组(宪章 1.2/1.3/2.2/2.4/5.2/6.1)
        run: bash .claude/hooks/governance-lite.sh
      - name: 门禁自测(防 commit-gate 匹配逻辑回归)
        run: bash .claude/hooks/selftest.sh
